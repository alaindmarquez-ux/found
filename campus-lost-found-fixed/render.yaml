services:
  - type: web
    name: campus-lost-found
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 3000
    disk:
      name: uploads
      mountPath: /opt/render/project/src/uploads
      sizeGB: 1
